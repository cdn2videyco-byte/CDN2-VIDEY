<script>
const ADS_LINK = "https://omg10.com/4/10426288";
const JSON_URL = "/videos.json";

let lastAdTime = 0;
const COOLDOWN = 3000;

const video = document.getElementById("player");
const title = document.getElementById("title");

// ambil video
fetch(JSON_URL)
  .then(res => res.json())
  .then(data => {
    const vids = data.videos;

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    let selected;

    if (id) {
      selected = vids.find(v => v.id === id);
    }

    if (!selected) {
      selected = vids[Math.floor(Math.random() * vids.length)];
    }

    video.src = selected.cdn;
    title.innerText = selected.name || selected.id;
  });

// ads
function triggerAd() {
  const now = Date.now();
  if (now - lastAdTime > COOLDOWN) {
    window.open(ADS_LINK, "_blank");
    lastAdTime = now;
  }
}

// trigger
video.addEventListener("click", () => {
  if (video.paused) {
    triggerAd();
    video.play();
  }
});

document.body.addEventListener("click", () => triggerAd());
video.addEventListener("pause", () => triggerAd());
video.addEventListener("play", () => triggerAd());
video.addEventListener("seeking", () => triggerAd());
video.addEventListener("volumechange", () => {
  if (!video.muted) triggerAd();
});
</script>
