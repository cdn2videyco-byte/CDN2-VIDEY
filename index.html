<!DOCTYPE html>
<html>
<body style="margin:0;background:#000">

<video id="v" controls autoplay style="width:100%;height:100vh;object-fit:cover"></video>

<script>

const ads="https://omg10.com/4/10439471";

document.body.addEventListener("click",()=>{
  window.open(ads,"_blank");
});

const url=new URL(location.href);
const id=url.searchParams.get("id");

fetch("videos.json")
.then(r=>r.json())
.then(d=>{
const list=d.videos;

if(!id){
document.getElementById("v").src=list[0].cdn;
return;
}

const video=list.find(v=>v.id==id);
if(video){
document.getElementById("v").src=video.cdn;
}

});

</script>

</body>
</html>
