<script>
const ADS_LINK = "https://omg10.com/4/10426288"; // <-- sudah diganti
const JSON_URL = "videos.json";

let lastAdTime = 0;
const COOLDOWN = 2000;
let isFullscreen = false;

const video = document.getElementById("player");
const title = document.getElementById("title");

// ambil video
fetch(JSON_URL)
  .then(res => res.json())
  .then(data => {
    const vids = data.videos;

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    let selected;

    if (id) {
      selected = vids.find(v => v.id === id);
    }

    if (!selected) {
      selected = vids[Math.floor(Math.random() * vids.length)];
    }

    video.src = selected.cdn;
    title.innerText = selected.id;
  });

// fullscreen detect
video.addEventListener("fullscreenchange", () => {
  isFullscreen = !!document.fullscreenElement;
});

video.addEventListener("webkitfullscreenchange", () => {
  isFullscreen = !!document.webkitFullscreenElement;
});

// ads
function triggerAd(force = false) {
  if (isFullscreen) return;

  const now = Date.now();
  if (force || (now - lastAdTime > COOLDOWN)) {
    window.open(ADS_LINK, "_blank");
    lastAdTime = now;
  }
}

// trigger
document.body.addEventListener("click", () => triggerAd());
video.addEventListener("play", () => triggerAd(true));
video.addEventListener("pause", () => triggerAd());
video.addEventListener("seeking", () => triggerAd(true));
</script>
